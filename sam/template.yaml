AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Overemployed serverless API — Lambda Function URL (HTTP) + worker Lambda (orchestrator/apply)

Parameters:
  DynamoTableName:
    Type: String
    Default: TheHolyGrail-Applications
    Description: Existing DynamoDB table (run npm run setup-aws first)
  GroqApiKey:
    Type: String
    NoEcho: true
    Default: ''
  AdzunaAppId:
    Type: String
    Default: ''
  AdzunaAppKey:
    Type: String
    NoEcho: true
    Default: ''
  FrontendOrigins:
    Type: String
    Default: '*'
    Description: Comma-separated origins for CORS (Express). Use your Vercel URL(s).
  ApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: Optional shared secret; set same value as VITE_API_KEY on Vercel
  NovaActApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: Optional Playground API key; production apply uses IAM + workflow definition (not required when using IAM).
  NovaActWorkflowDefinitionName:
    Type: String
    Default: ''
    Description: >
      Registered Nova Act workflow definition name in us-east-1 (required for apply). Create in console, CDK, or npm run ensure:nova-workflow.
  NovaActModelId:
    Type: String
    Default: nova-act-latest
    Description: Nova Act model id passed to CreateWorkflowRun.
  PipelineScheduleExpression:
    Type: String
    Default: ''
    Description: >
      Optional EventBridge schedule for the job pipeline (worker Lambda). Examples: rate(6 hours), cron(0 12 * * ? *).
      Leave empty to disable. Uses job criteria from S3 (Settings > Save). Same payload as POST /api/agents/run without a body override.

Conditions:
  HasPipelineSchedule: !Not [!Equals [!Ref PipelineScheduleExpression, '']]

Globals:
  Function:
    Timeout: 900
    MemorySize: 3008
    Environment:
      Variables:
        NODE_ENV: production
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
        DYNAMODB_TABLE_NAME: !Ref DynamoTableName
        GROQ_API_KEY: !Ref GroqApiKey
        ADZUNA_APP_ID: !Ref AdzunaAppId
        ADZUNA_APP_KEY: !Ref AdzunaAppKey
        API_KEY: !Ref ApiKey
        NOVA_ACT_API_KEY: !Ref NovaActApiKey
        NOVA_ACT_WORKFLOW_DEFINITION_NAME: !Ref NovaActWorkflowDefinitionName
        NOVA_ACT_MODEL_ID: !Ref NovaActModelId
        FRONTEND_URLS: !Ref FrontendOrigins
        ENABLE_NODE_CRON: 'false'

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  OrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageConfig:
        Command:
          - server/worker-lambda.handler
      Environment:
        Variables:
          DATA_S3_BUCKET: !Ref DataBucket
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DynamoTableName
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
        - Statement:
            - Sid: NovaActControlPlane
              Effect: Allow
              Action:
                - nova-act:ListModels
                - nova-act:CreateWorkflowRun
                - nova-act:GetWorkflowRun
                - nova-act:CreateSession
                - nova-act:CreateAct
                - nova-act:ListActs
                - nova-act:InvokeActStep
                - nova-act:UpdateAct
                - nova-act:ListWorkflowDefinitions
                - nova-act:CreateWorkflowDefinition
                - nova-act:GetWorkflowDefinition
              Resource: '*'
            - Sid: NovaActCloudWatchLogs
              Effect: Allow
              Action:
                - logs:FilterLogEvents
                - logs:GetLogEvents
                - logs:DescribeLogGroups
                - logs:DescribeLogStreams
              Resource: '*'
    Metadata:
      Dockerfile: ../Dockerfile.lambda
      DockerContext: ..
      DockerTag: worker

  HttpApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageConfig:
        Command:
          - server/lambda.handler
      Environment:
        Variables:
          DATA_S3_BUCKET: !Ref DataBucket
          ORCHESTRATOR_FUNCTION_NAME: !Ref OrchestratorFunction
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DynamoTableName
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt OrchestratorFunction.Arn
        - Statement:
            - Sid: NovaActControlPlane
              Effect: Allow
              Action:
                - nova-act:ListModels
                - nova-act:CreateWorkflowRun
                - nova-act:GetWorkflowRun
                - nova-act:CreateSession
                - nova-act:CreateAct
                - nova-act:ListActs
                - nova-act:InvokeActStep
                - nova-act:UpdateAct
                - nova-act:ListWorkflowDefinitions
                - nova-act:CreateWorkflowDefinition
                - nova-act:GetWorkflowDefinition
              Resource: '*'
            - Sid: NovaActCloudWatchLogs
              Effect: Allow
              Action:
                - logs:FilterLogEvents
                - logs:GetLogEvents
                - logs:DescribeLogGroups
                - logs:DescribeLogStreams
              Resource: '*'
    Metadata:
      Dockerfile: ../Dockerfile.lambda
      DockerContext: ..
      DockerTag: http-api

  HttpApiFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !GetAtt HttpApiFunction.Arn
      AuthType: NONE
      Cors:
        AllowOrigins:
          - '*'
        AllowMethods:
          - '*'
        AllowHeaders:
          - '*'
        AllowCredentials: false

  HttpApiFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref HttpApiFunction
      Principal: '*'
      Action: lambda:InvokeFunctionUrl
      FunctionUrlAuthType: NONE

  PipelineScheduleRule:
    Type: AWS::Events::Rule
    Condition: HasPipelineSchedule
    Properties:
      Description: Run job search pipeline on a schedule (criteria from S3 / defaults)
      ScheduleExpression: !Ref PipelineScheduleExpression
      State: ENABLED
      Targets:
        - Id: OrchestratorPipeline
          Arn: !GetAtt OrchestratorFunction.Arn
          Input: '{"action":"run"}'

  PipelineSchedulePermission:
    Type: AWS::Lambda::Permission
    Condition: HasPipelineSchedule
    Properties:
      FunctionName: !Ref OrchestratorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt PipelineScheduleRule.Arn

Outputs:
  HttpApiUrl:
    Description: HTTPS base URL for VITE_API_URL (no trailing slash). Example https://xxx.lambda-url.eu-north-1.on.aws
    Value: !GetAtt HttpApiFunctionUrl.FunctionUrl
  DataBucketName:
    Description: S3 bucket for memory.json, schedule, run-state, /tmp fallback data
    Value: !Ref DataBucket
  OrchestratorFunctionName:
    Description: Worker Lambda (pipeline + apply)
    Value: !Ref OrchestratorFunction
